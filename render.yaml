services:
  - type: web
    name: sunbound-boheme-api
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: npm start
    disk:
      name: sunbound-boheme-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: file:/var/data/sunbound-boheme.db
      - key: CLIENT_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ORDER_NOTIFY_TO
        sync: false
